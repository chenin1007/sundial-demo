<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D太阳视运动与日影模拟器</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Captain's太阳视运动模拟器</h1>
        
        <!-- 控制面板 -->
        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <h2>控制参数</h2>
                <button class="panel-toggle-btn" id="togglePanel">−</button>
            </div>

            <div class="panel-content">
                <div class="control-group">
                    <label>📅 日期：</label>
                    <input type="range" id="day-of-year" min="1" max="365" value="80" step="1">
                    <span id="day-value">3月21日</span>
                </div>
                
                <div class="solar-terms">
                    <button id="vernal-equinox">🌱 春分</button>
                    <button id="summer-solstice">☀️ 夏至</button>
                    <button id="autumnal-equinox">🍂 秋分</button>
                    <button id="winter-solstice">❄️ 冬至</button>
                </div>
                
                <div class="control-group">
                    <label>🌍 纬度：</label>
                    <input type="range" id="latitude" min="-90" max="90" value="40" step="0.1">
                    <span id="latitude-value">40°</span>
                </div>

                <div class="latitude-buttons">
                    <button id="arctic-circle">北极圈</button>
                    <button id="tropic-cancer">北回归线</button>
                    <button id="equator">赤道</button>
                    <button id="tropic-capricorn">南回归线</button>
                    <button id="antarctic-circle">南极圈</button>
                </div>
                
                <div class="control-group">
                    <label>⏰ 地方时：</label>
                    <input type="range" id="time" min="0" max="24" value="12" step="0.1">
                    <span id="time-value">12:00</span>
                </div>
                
                <div class="quick-buttons">
                    <button onclick="setTime('sunrise')">🌅 日出</button>
                    <button onclick="setTime('noon')">☀️ 正午</button>
                    <button onclick="setTime('sunset')">🌇 日落</button>
                </div>
            </div>
        </div>
        
        <!-- 视角控制 -->
        <div class="view-controls">
            <button class="view-controls-toggle" id="toggleViewControls">▼</button>
            <div class="view-controls-content">
                <button class="view-btn active" onclick="setView('default')">默认</button>
                <button class="view-btn" onclick="setView('top')">俯视</button>
                <button class="view-btn" onclick="setView('side')">侧视</button>
                <button class="toggle-btn active view-toggle-special" id="azimuthBtn" onclick="toggleAzimuth()">方位角</button>
                <button class="toggle-btn active view-toggle-special" id="trajectoryBtn" onclick="toggleTrajectory()">轨迹</button>
            </div>
        </div>

        <div id="canvas-container"></div>
        
        <!-- 太阳信息栏 -->
        <div class="sun-info-bar" id="sunInfoBar">
            <button class="sun-info-toggle" id="toggleSunInfo">▶</button>
            <div class="sun-info-drag-handle" title="拖动移动"></div>
            <div class="sun-info-content">
                <div class="info-item">
                    <span class="info-label">高度角</span>
                    <span class="info-value" id="altitude">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">方位角</span>
                    <span class="info-value" id="azimuth">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">日出</span>
                    <span class="info-value" id="sunrise-time">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">日落</span>
                    <span class="info-value" id="sunset-time">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">日照时长</span>
                    <span class="info-value" id="day-length">--</span>
                </div>
            </div>
        </div>

    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
